<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychiatrie Domino</title>

<style>
body {
  font-family: -apple-system;
  text-align: center;
  background: linear-gradient(135deg, #e3f2fd, #fce4ec);
}

h1 { margin-top: 20px; }

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 40%;
  margin: 10px;
  padding: 20px;
  font-size: 18px;
  border-radius: 15px;
  background: white;
  box-shadow: 0 6px 12px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: transform 0.2s;
}

.card:active {
  transform: scale(0.95);
}

.selected { background: #bbdefb; }
.correct { background: #c8e6c9; }

.topbar {
  display: flex;
  justify-content: space-around;
  margin: 15px;
  font-size: 18px;
  font-weight: bold;
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 10px;
}

#win {
  display: none;
  font-size: 26px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🧠 Psychiatrie Domino</h1>

<div class="topbar">
  <div>⏱️ Zeit: <span id="time">0</span>s</div>
  <div>🏆 Punkte: <span id="score">0</span></div>
</div>

<div class="container" id="game"></div>

<button onclick="restart()">🔄 Neu starten</button>

<div id="win">🎉 Geschafft! Sehr gut! 🎉</div>

<script>
let cards = [
  {id:1, text:"Psychiatrie", match:1},
  {id:2, text:"medizinisches Fachgebiet für psychische Erkrankungen", match:1},

  {id:3, text:"Depression", match:2},
  {id:4, text:"affektive Störung mit gedrückter Stimmung", match:2},

  {id:5, text:"Angststörung", match:3},
  {id:6, text:"übermäßige Angst ohne reale Gefahr", match:3},

  {id:7, text:"Schizophrenie", match:4},
  {id:8, text:"Wahn und Halluzinationen", match:4},

  {id:9, text:"Demenz", match:5},
  {id:10, text:"Abbau kognitiver Fähigkeiten", match:5},

  {id:11, text:"Wahn", match:6},
  {id:12, text:"falsche Überzeugung", match:6},

  {id:13, text:"Halluzination", match:7},
  {id:14, text:"Wahrnehmung ohne Reiz", match:7},

  {id:15, text:"Zwangsstörung", match:8},
  {id:16, text:"wiederkehrende Gedanken", match:8},

  {id:17, text:"Sucht", match:9},
  {id:18, text:"Abhängigkeit", match:9},

  {id:19, text:"Suizidalität", match:10},
  {id:20, text:"Gedanken an Selbsttötung", match:10}
];

let selected = [];
let score = 0;
let time = 0;
let timer;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startTimer() {
  clearInterval(timer);
  time = 0;
  timer = setInterval(() => {
    time++;
    document.getElementById("time").innerText = time;
  }, 1000);
}

function render() {
  let game = document.getElementById("game");
  game.innerHTML = "";
  selected = [];

  shuffle(cards).forEach(card => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = card.text;
    div.onclick = () => selectCard(div, card);
    game.appendChild(div);
  });
}

function selectCard(el, card) {
  if (selected.length < 2 && !el.classList.contains("correct")) {
    el.classList.add("selected");
    selected.push({el, card});
  }

  if (selected.length === 2) {
    let [a, b] = selected;

    if (a.card.match === b.card.match && a.card.id !== b.card.id) {
      a.el.classList.add("correct");
      b.el.classList.add("correct");
      score += 10;
      document.getElementById("score").innerText = score;

      checkWin();
    } else {
      setTimeout(() => {
        a.el.classList.remove("selected");
        b.el.classList.remove("selected");
      }, 600);
    }

    selected = [];
  }
}

function checkWin() {
  let correct = document.querySelectorAll(".correct").length;
  if (correct === cards.length) {
    clearInterval(timer);
    document.getElementById("win").style.display = "block";
    confetti();
  }
}

function restart() {
  score = 0;
  document.getElementById("score").innerText = score;
  document.getElementById("win").style.display = "none";
  render();
  startTimer();
}

// 🎉 простой "салют"
function confetti() {
  for (let i = 0; i < 100; i++) {
    let div = document.createElement("div");
    div.style.position = "fixed";
    div.style.width = "8px";
    div.style.height = "8px";
    div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    div.style.left = Math.random()*100 + "vw";
    div.style.top = "-10px";
    div.style.opacity = 0.8;
    div.style.borderRadius = "50%";
    document.body.appendChild(div);

    let fall = setInterval(() => {
      let top = parseFloat(div.style.top);
      div.style.top = top + 5 + "px";
      if (top > window.innerHeight) {
        div.remove();
        clearInterval(fall);
      }
    }, 30);
  }
}

render();
startTimer();
</script>

</body>
</html>
