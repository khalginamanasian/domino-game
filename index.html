<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychiatrie Domino</title>

<style>
body {
  font-family: -apple-system;
  text-align: center;
  background: linear-gradient(to right, #dfe9f3, #ffffff);
}

h1 { margin-top: 20px; }

#menu {
  margin-top: 50px;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #4dabf7;
  color: white;
  cursor: pointer;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 40%;
  margin: 10px;
  padding: 20px;
  font-size: 17px;
  border-radius: 15px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
}

.selected { background: #cce5ff; }
.correct { background: #b2f2bb; }

#info {
  margin: 15px;
  font-size: 18px;
}

#confetti {
  font-size: 40px;
  display: none;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🧠 Psychiatrie Domino</h1>
  <button onclick="startGame()">▶ Spiel starten</button>
</div>

<div id="game" style="display:none;">
  <div id="info">
    ⏱ Zeit: <span id="time">0</span>s |
    ⭐ Punkte: <span id="score">0</span>
  </div>

  <div class="container" id="cards"></div>
  <div id="confetti">🎉🎉🎉 Gewonnen! 🎉🎉🎉</div>
</div>

<script>
let cards = [
  {id:1, text:"Psychiatrie", match:1},
  {id:2, text:"medizinisches Fachgebiet für psychische Erkrankungen", match:1},

  {id:3, text:"Depression", match:2},
  {id:4, text:"anhaltende Traurigkeit und Antriebslosigkeit", match:2},

  {id:5, text:"Angststörung", match:3},
  {id:6, text:"starke Angst ohne reale Gefahr", match:3},

  {id:7, text:"Schizophrenie", match:4},
  {id:8, text:"Wahnvorstellungen und Halluzinationen", match:4},

  {id:9, text:"Demenz", match:5},
  {id:10, text:"Abbau von Gedächtnis und Orientierung", match:5},

  {id:11, text:"Wahn", match:6},
  {id:12, text:"feste falsche Überzeugung, nicht korrigierbar", match:6},

  {id:13, text:"Halluzination", match:7},
  {id:14, text:"Wahrnehmung ohne äußeren Reiz", match:7},

  {id:15, text:"Zwangsstörung", match:8},
  {id:16, text:"wiederkehrende Gedanken oder Handlungen", match:8},

  {id:17, text:"Sucht", match:9},
  {id:18, text:"Abhängigkeit von Substanzen oder Verhalten", match:9},

  {id:19, text:"Suizidalität", match:10},
  {id:20, text:"Gedanken an Selbsttötung", match:10}
];

let selected = [];
let score = 0;
let time = 0;
let timer;
let matchedPairs = 0;

function playSound(type) {
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  let gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  if (type === "correct") osc.frequency.value = 600;
  if (type === "wrong") osc.frequency.value = 200;
  if (type === "win") osc.frequency.value = 800;

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  score = 0;
  time = 0;
  matchedPairs = 0;

  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;

  timer = setInterval(() => {
    time++;
    document.getElementById("time").innerText = time;
  }, 1000);

  render();
}

function render() {
  let container = document.getElementById("cards");
  container.innerHTML = "";
  selected = [];

  shuffle(cards).forEach(card => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = card.text;
    div.onclick = () => selectCard(div, card);
    container.appendChild(div);
  });
}

function selectCard(el, card) {
  if (selected.length < 2 && !el.classList.contains("correct")) {
    el.classList.add("selected");
    selected.push({el, card});
  }

  if (selected.length === 2) {
    let [a, b] = selected;

    if (a.card.match === b.card.match && a.card.id !== b.card.id) {
      a.el.classList.remove("selected");
      b.el.classList.remove("selected");
      a.el.classList.add("correct");
      b.el.classList.add("correct");

      playSound("correct");

      score += 10;
      matchedPairs++;

      document.getElementById("score").innerText = score;

      if (matchedPairs === cards.length / 2) {
        clearInterval(timer);
        document.getElementById("confetti").style.display = "block";
        playSound("win");
      }

    } else {
      playSound("wrong");

      score -= 2;
      document.getElementById("score").innerText = score;

      setTimeout(() => {
        a.el.classList.remove("selected");
        b.el.classList.remove("selected");
      }, 700);
    }

    selected = [];
  }
}
</script>

</body>
</html>
