<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Psychiatrie – Begriffsdomino</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 12px;
      touch-action: manipulation;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin: 10px 0;
      font-size: 1.4em;
    }
    #board {
      min-height: 160px;
      border: 2px dashed #aaa;
      border-radius: 10px;
      margin: 12px 0;
      padding: 12px;
      background: white;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
    }
    .card {
      width: 110px;
      height: 150px;
      background: #fff;
      border: 2px solid #3498db;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      font-size: 0.9em;
      user-select: none;
      touch-action: manipulation;
    }
    .half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      text-align: center;
      line-height: 1.3;
    }
    .top    { background: #3498db; color: white; font-weight: bold; }
    .bottom { background: #ecf0f1; color: #2c3e50; }
    .correct { border-color: #27ae60 !important; box-shadow: 0 0 0 3px #27ae60; }
    .wrong   { border-color: #e74c3c !important; }
    #stock {
      margin: 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 10px 18px;
      font-size: 1em;
      margin: 8px;
      border: none;
      border-radius: 8px;
      background: #27ae60;
      color: white;
      font-weight: bold;
    }
    button:active { background: #219653; }
    #message {
      text-align: center;
      font-weight: bold;
      min-height: 1.4em;
      margin: 10px 0;
      color: #27ae60;
    }
  </style>
</head>

<div id="board">Lege hier die erste Karte hin …</div>
<div id="message"></div>

<div id="stock"></div>

<button onclick="resetGame()">Neues Spiel</button>
