<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychiatrie Domino</title>

<style>
body {
  font-family: -apple-system;
  text-align: center;
  background: #f0f4f8;
}

h2 { margin-top: 20px; }

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 40%;
  margin: 10px;
  padding: 20px;
  font-size: 18px;
  border-radius: 15px;
  background: white;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  cursor: pointer;
}

.selected { background: #cce5ff; }
.correct { background: #b2f2bb; }

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>🧠 Psychiatrie Domino</h2>
<p>Tippe zwei passende Karten</p>

<div class="container" id="game"></div>
<button onclick="render()">🔄 Neu mischen</button>

<script>
let cards = [
  {id:1, text:"Psychiatrie", match:1},
  {id:2, text:"medizinisches Fachgebiet für psychische Erkrankungen", match:1},

  {id:3, text:"Depression", match:2},
  {id:4, text:"affektive Störung mit gedrückter Stimmung", match:2},

  {id:5, text:"Angststörung", match:3},
  {id:6, text:"übermäßige Angst ohne reale Gefahr", match:3},

  {id:7, text:"Schizophrenie", match:4},
  {id:8, text:"Wahn und Halluzinationen", match:4},

  {id:9, text:"Demenz", match:5},
  {id:10, text:"Abbau kognitiver Fähigkeiten", match:5},

  {id:11, text:"Wahn", match:6},
  {id:12, text:"falsche Überzeugung, nicht korrigierbar", match:6},

  {id:13, text:"Halluzination", match:7},
  {id:14, text:"Wahrnehmung ohne äußeren Reiz", match:7},

  {id:15, text:"Zwangsstörung", match:8},
  {id:16, text:"wiederkehrende Gedanken oder Handlungen", match:8},

  {id:17, text:"Sucht", match:9},
  {id:18, text:"Abhängigkeit von Substanzen oder Verhalten", match:9},

  {id:19, text:"Suizidalität", match:10},
  {id:20, text:"Gedanken oder Absichten, sich zu töten", match:10}
];

let selected = [];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function render() {
  let game = document.getElementById("game");
  game.innerHTML = "";
  selected = [];

  shuffle(cards).forEach(card => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = card.text;
    div.onclick = () => selectCard(div, card);
    game.appendChild(div);
  });
}

function selectCard(el, card) {
  if (selected.length < 2 && !el.classList.contains("correct")) {
    el.classList.add("selected");
    selected.push({el, card});
  }

  if (selected.length === 2) {
    let [a, b] = selected;

    if (a.card.match === b.card.match && a.card.id !== b.card.id) {
      a.el.classList.remove("selected");
      b.el.classList.remove("selected");
      a.el.classList.add("correct");
      b.el.classList.add("correct");
    } else {
      setTimeout(() => {
        a.el.classList.remove("selected");
        b.el.classList.remove("selected");
      }, 700);
    }

    selected = [];
  }
}

render();
</script>

</body>
</html>
